name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  test:
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - name: Set up step
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y --no-install-recommends
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cpanminus \
            curl \
            libhiredis-dev \
            libjansson-dev \
            libnginx-mod-http-lua \
            luarocks \
            nginx \
            nginx-dev \
            redis
          if [ ! "${nginx_version}" = "ubuntu" ]; then
            sudo apt-get install -y --no-install-recommends \
              libluajit2-5.1-dev
          fi
          sudo luarocks install lua-resty-http
          sudo luarocks install lua-resty-string
          sudo luarocks install lua-resty-openssl
          sudo cpanm -n Test::Nginx
        env:
          nginx_version: ${{ matrix.nginx }}
          DEBIAN_FRONTEND: noninteractive
          PERL_MM_OPT: ''
          PERL_MM_USE_DEFAULT: 1
          PERL5LIB: ''
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          set-safe-directory: ${{ github.workspace }}
          token: ${{ github.token }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - if: ${{ matrix.nginx == 'ubuntu' }}
        name: Build with Ubuntu
        run: |
          # Download Nginx
          nginx_version="$(nginx -v 2>&1 | sed -e 's/^[^0-9]*//' -e 's/ .*$//')"
          curl -sL -o "nginx-${nginx_version}.tar.gz" "https://nginx.org/download/nginx-${nginx_version}.tar.gz"
          tar xf "nginx-${nginx_version}.tar.gz"
          cd "nginx-${nginx_version}"
          # Configure option
          opt=$(nginx -V 2>&1 | tail -1 | sed -e 's/configure arguments://' -e 's| --add-dynamic-module=[^ ]*||g')
          with_cc_opt=$(echo "${opt}" | grep -e "--with-cc-opt='[^']*'" -o | sed -e "s/^--with-cc-opt='//" -e "s/'$//")
          with_ld_opt=$(echo "${opt}" | grep -e "--with-ld-opt='[^']*'" -o | sed -e "s/^--with-ld-opt='//" -e "s/'$//")
          opt=$(echo "${opt}" | sed -e "s|--with-cc-opt='[^']*'||" -e "s|--with-ld-opt='[^']*'||" -e 's/--without-engine//')
          # Run build
          # shellcheck disable=SC2086
          ./configure \
            ${opt} \
            --with-cc-opt="${with_cc_opt} -DNGX_HTTP_HEADERS" \
            --with-ld-opt="${with_ld_opt}" \
            --add-dynamic-module=..
          make
          # Copy module
          sudo mkdir -p /usr/share/nginx/modules
          sudo cp objs/ngx_http_oidc_module.so /usr/share/nginx/modules/
          sudo ln -sfn /usr/sbin/nginx /usr/local/sbin/nginx
      - if: ${{ matrix.nginx != 'ubuntu' }}
        name: Build with sources
        run: |
          # Download Lua module: 0.10.26
          curl -sL -o nginx-mod-lua.tar.gz https://github.com/openresty/lua-nginx-module/archive/refs/tags/v0.10.26.tar.gz
          tar xf nginx-mod-lua.tar.gz
          # Download NDK module
          curl -sL -o nginx-mod-ndk.tar.gz https://github.com/vision5/ngx_devel_kit/archive/refs/tags/v0.3.4.tar.gz
          tar xf nginx-mod-ndk.tar.gz
          # Download Nginx
          curl -sL -o "nginx-${nginx_version}.tar.gz" "https://nginx.org/download/nginx-${nginx_version}.tar.gz"
          tar xf "nginx-${nginx_version}.tar.gz"
          cd "nginx-${nginx_version}"
          # Run build
          ./configure \
            --with-compat \
            --with-debug \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-pcre \
            --with-pcre-jit \
            --add-dynamic-module=../lua-nginx-module-0.10.26 \
            --add-dynamic-module=../ngx_devel_kit-0.3.4 \
            --add-dynamic-module=..
          make -j
          # Copy module
          sudo mkdir -p /usr/share/nginx/modules
          sudo cp objs/ndk_http_module.so /usr/share/nginx/modules/
          sudo cp objs/ngx_http_lua_module.so /usr/share/nginx/modules/
          sudo cp objs/ngx_http_oidc_module.so /usr/share/nginx/modules/
          sudo cp objs/nginx /usr/local/sbin/
        env:
          nginx_version: ${{ matrix.nginx }}
          LUAJIT_INC: /usr/include/luajit-2.1
          LUAJIT_LIB: /usr/lib/x86_64-linux-gnu
      - name: Test
        run: |
          # nginx
          echo "::group::nginx show version"
          ${TEST_NGINX_BINARY} -V
          echo "::endgroup::"
          # Run IdP stub
          docker run \
            --rm --detach \
            --name oidc-stub \
            -p 8888:8888 \
            -e OIDC_CLIENT_ID="test" \
            -e OIDC_CLIENT_SECRET="b028e7a42bbb072acf09ed342e760627" \
            -e OIDC_REDIRECT_URI="http://127.0.0.1:1984/oidc_callback" \
            ghcr.io/kjdev/oidc-provider-stub &>/dev/null
          # Run Redis
          redis-server --daemonize yes
          # Run test
          export TEST_NGINX_CONF_DIR="${PWD}/t/conf"
          prove -r t
        env:
          TEST_NGINX_LOAD_MODULES: /usr/share/nginx/modules/ngx_http_oidc_module.so /usr/share/nginx/modules/ndk_http_module.so /usr/share/nginx/modules/ngx_http_lua_module.so
          TEST_NGINX_LUA_DIR: /usr/share/lua/5.1/
          TEST_NGINX_PORT: 1984
          TEST_NGINX_SERVROOT: /tmp/servroot
          TEST_NGINX_BINARY: /usr/local/sbin/nginx
    timeout-minutes: 30
    strategy:
      matrix:
        nginx:
          - ubuntu
          - '1.29.5'
